<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- background -->
  <rect width="512" height="512" fill="#1a1c20"/>
  <!-- outer frame: filled gold rect -->
  <rect x="112" y="112" width="288" height="288" fill="#d6a24a"/>
  <!-- punch out the interior, leaving only the border (16px thick) -->
  <rect x="128" y="128" width="256" height="256" fill="#1a1c20"/>
  <!-- inner filled square: inset 48px from outer edge = 16px border + 32px gap -->
  <rect x="160" y="160" width="192" height="192" fill="#d6a24a"/>
</svg>
